methods: "Theta method (M3 competition winner) with Box-Cox stabilization and bootstrapped prediction intervals via fable generate()."
methods_long: "Uses fable's THETA() method, which decomposes the series into theta lines and combines SES with drift on the seasonally adjusted series. Box-Cox transformation (lambda via guerrero per location) stabilizes variance. Prediction intervals from 1000 bootstrapped residual paths via fable generate(bootstrap=TRUE). Empirical quantiles at 23 levels. Values floored at zero for non-negativity."

methods: "Auto-ARIMA with Box-Cox variance stabilization and bootstrapped residual prediction intervals via fable generate()."
methods_long: "Uses fable's ARIMA() with automatic (p,d,q)(P,D,Q)[52] order selection via AICc and Box-Cox transformation (lambda estimated via guerrero method per location) to forecast weekly weighted ILI percentages. The model captures both short-term autoregressive momentum and seasonal patterns. Prediction intervals are generated from 1000 bootstrapped residual paths using fable generate(bootstrap=TRUE), with empirical quantiles extracted at 23 levels. Forecasted values are floored at zero."

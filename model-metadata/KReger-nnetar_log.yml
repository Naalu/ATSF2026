methods: "NNETAR neural-network autoregression with log(x + 0.001) variance stabilization and bootstrapped residual simulation via fable generate()."
methods_long: "Uses fable's NNETAR() feed-forward neural network with auto-selected lagged inputs (seasonal and non-seasonal) and a log(x + 0.001) transformation. The 0.001 offset prevents log(0) for the rare zero-valued summer observations. Twenty networks with random starting weights are fit and averaged to reduce initialization sensitivity. Prediction intervals are generated from 1000 bootstrapped residual paths via fable generate(bootstrap=TRUE) — NNETAR has no closed-form predictive distribution, so simulation is the only path to quantiles. Empirical quantiles at 23 levels, floored at zero. Companion candidate to nnetar_bc_bs: same architecture, simpler transform. Phase 2 correlation analysis determines whether both contribute or are twins."

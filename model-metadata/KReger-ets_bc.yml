methods: "ETS state-space model with Box-Cox variance stabilization (per-location guerrero lambda) and bootstrapped residual prediction intervals via fable generate()."
methods_long: "Uses fable's ETS() with automatic error/trend/seasonal component selection (minimizing AICc) and Box-Cox transformation (lambda estimated via guerrero method per location) to forecast weekly weighted ILI percentages. The model is fit independently per location for each origin date. Prediction intervals are generated from 1000 bootstrapped residual paths via fable generate(bootstrap=TRUE), with empirical quantiles extracted at 23 levels and floored at zero. Companion candidate to ets_log: same model family, location-adaptive transform (Box-Cox per location vs. uniform log+offset). Phase 2 correlation analysis determines whether both add value or are twins."

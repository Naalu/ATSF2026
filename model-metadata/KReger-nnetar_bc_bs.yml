methods: "NNETAR neural network autoregression with Box-Cox stabilization and bootstrapped residual simulation via fable generate()."
methods_long: "Uses fable's NNETAR() feed-forward neural network with auto-selected lagged inputs (seasonal and non-seasonal) and Box-Cox transformation (lambda via guerrero per location). Twenty networks with random starting weights are averaged. Prediction intervals from 1000 bootstrapped residual simulation paths using fable generate(bootstrap=TRUE). Empirical quantiles at 23 levels. Values floored at zero for non-negativity."
